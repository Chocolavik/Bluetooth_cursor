name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'tablet/BluetoothCursorBridge/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle (no wrapper jar needed — version is pinned here) ────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      # ── 4. Create local.properties so Gradle can find the Android SDK ───────
      - name: Create local.properties
        run: |
          echo "ANDROID_HOME is: $ANDROID_HOME"
          echo "sdk.dir=$ANDROID_HOME" > tablet/BluetoothCursorBridge/local.properties
          cat tablet/BluetoothCursorBridge/local.properties

      # ── 5. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: tablet/BluetoothCursorBridge
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "### Gradle Build Log (last 200 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $BUILD_EXIT

      # ── 6. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCursorBridge-debug
          path: tablet/BluetoothCursorBridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

