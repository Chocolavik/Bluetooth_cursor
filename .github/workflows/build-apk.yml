name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'tablet/BluetoothCursorBridge/**'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repo ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Android SDK ────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x tablet/BluetoothCursorBridge/gradlew

      # ── 5. Download gradle-wrapper.jar (not stored in git) ───────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p tablet/BluetoothCursorBridge/gradle/wrapper
          curl -L -o tablet/BluetoothCursorBridge/gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar"

      # ── 6. Build debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: tablet/BluetoothCursorBridge
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Upload APK as a downloadable artifact ─────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCursorBridge-debug
          path: tablet/BluetoothCursorBridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
