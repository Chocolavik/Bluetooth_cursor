name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'tablet/BluetoothCursorBridge/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle (no wrapper jar needed — version is pinned here) ────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      # ── 4. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: tablet/BluetoothCursorBridge
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}  # pre-installed on ubuntu-latest
        run: gradle assembleDebug --no-daemon --stacktrace

      # ── 5. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCursorBridge-debug
          path: tablet/BluetoothCursorBridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

